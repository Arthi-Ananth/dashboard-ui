<header class="header d-flex align-items-center justify-content-between px-4">
  <div class="breadcrumb-container d-flex align-items-center">
    <i class="bi bi-star me-3 opacity-50"></i>
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb mb-0">
        <li class="breadcrumb-item" *ngFor="let item of breadcrumbs; let last = last" [class.active]="last">
          <a *ngIf="!last" href="#" class="text-decoration-none text-muted">{{ item }}</a>
          <span *ngIf="last">{{ item }}</span>
        </li>
      </ol>
    </nav>
  </div>

  <div class="header-actions d-flex align-items-center gap-3">
    <div class="search-container">
      <div class="input-group input-group-sm">
        <span class="input-group-text border-0 bg-transparent opacity-50">
          <i class="bi bi-search"></i>
        </span>
        <input type="text" class="form-control border-0 bg-transparent shadow-none" placeholder="Search" aria-label="Search">
        <span class="input-group-text border-0 bg-transparent opacity-50 pe-3">
          <span class="command-key">⌘/</span>
        </span>
      </div>
    </div>
    
    <button class="btn btn-link text-muted p-0"><i class="bi bi-clock-history fs-5"></i></button>
    <button class="btn btn-link text-muted p-0"><i class="bi bi-bell fs-5"></i></button>
    <button class="btn btn-link text-muted p-0"><i class="bi bi-layout-sidebar-reverse fs-5"></i></button>
  </div>
</header>
