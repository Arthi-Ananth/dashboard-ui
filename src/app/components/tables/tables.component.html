<div class="card p-4 border-0">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h6 class="fw-bold mb-0">Products</h6>
  </div>
  
  <div class="table-responsive">
    <table class="table table-borderless align-middle mb-0">
      <thead>
        <tr>
          <th class="text-muted fw-normal small">info</th>
          <th class="text-muted fw-normal small">Date</th>
          <th class="text-muted fw-normal small">Amount</th>
          <th class="text-muted fw-normal small">Status</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let product of products">
          <td>
            <div class="d-flex align-items-center">
              <img [src]="'https://ui-avatars.com/api/?name=' + product.name + '&background=random'" class="rounded-circle me-3" width="24" height="24">
              <span class="small fw-medium">{{ product.name }}</span>
            </div>
          </td>
          <td class="small">{{ product.date }}</td>
          <td class="small">{{ product.amount }}</td>
          <td>
            <span class="badge rounded-pill fw-medium px-3 py-2" [ngClass]="'status-' + product.statusColor">
              {{ product.status }}
            </span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
