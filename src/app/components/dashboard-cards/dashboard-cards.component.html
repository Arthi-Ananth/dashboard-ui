<div class="row g-4 d-flex">
  <!-- Card 1 -->
  <div class="col-md-6 col-xl-3">
    <div class="card h-100 border-light p-4 shadow-none custom-rounded">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="icon-box-sq bg-indigo-light">
          <i class="bi bi-cart-fill text-indigo"></i>
        </div>
        <div class="trend text-success fw-bold d-flex align-items-center">
          <span class="me-1">+22%</span>
          <i class="bi bi-arrow-up-right"></i>
        </div>
      </div>
      <div class="mt-auto">
        <h2 class="fw-bold mb-1 fs-3">155k</h2>
        <p class="text-muted small mb-3">Total Orders</p>
        <div class="pill-badge">Last 4 Month</div>
      </div>
    </div>
  </div>

  <!-- Card 2 -->
  <div class="col-md-6 col-xl-3">
    <div class="card h-100 border-light p-4 shadow-none custom-rounded">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="icon-box-sq bg-green-light">
          <i class="bi bi-bag-fill text-green"></i>
        </div>
        <div class="trend text-success fw-bold d-flex align-items-center">
          <span class="me-1">+38%</span>
          <i class="bi bi-arrow-up-right"></i>
        </div>
      </div>
      <div class="mt-auto">
        <h2 class="fw-bold mb-1 fs-3">$13.4k</h2>
        <p class="text-muted small mb-3">Total Sales</p>
        <div class="pill-badge">Last Six Month</div>
      </div>
    </div>
  </div>

  <!-- Card 3 -->
  <div class="col-md-6 col-xl-3">
    <div class="card h-100 border-light p-4 shadow-none custom-rounded">
      <div class="d-flex justify-content-between align-items-start mb-1">
        <h2 class="fw-bold fs-3 mb-0">$88.5k</h2>
        <div class="trend text-danger fw-bold d-flex align-items-center">
          <span class="me-1">-18%</span>
        </div>
      </div>
      <p class="text-muted small mb-4">Total Profit</p>
      <div class="chart-area-mini mx-auto">
        <canvas #miniChart></canvas>
      </div>
    </div>
  </div>

  <!-- Card 4 -->
  <div class="col-md-6 col-xl-3">
    <div class="card h-100 border-light p-4 shadow-none custom-rounded">
      <div class="d-flex justify-content-between align-items-start mb-1">
        <h2 class="fw-bold fs-3 mb-0">$27.9k</h2>
        <div class="trend text-success fw-bold d-flex align-items-center">
          <span class="me-1">+16%</span>
        </div>
      </div>
      <p class="text-muted small mb-1">Total Growth</p>
      <div class="chart-area-mini mx-auto position-relative d-flex align-items-center justify-content-center">
        <canvas #miniChart></canvas>
        <span class="position-absolute fs-7 fw-bold">12%</span>
      </div>
    </div>
  </div>
</div>
