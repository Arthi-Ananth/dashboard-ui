<div class="card p-4 border-0">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div class="d-flex align-items-center gap-4">
      <h6 class="fw-bold mb-0">Total Users</h6>
      <span class="text-muted small">Total Projects</span>
      <span class="text-muted small">Operating Status</span>
    </div>
    <div class="d-flex align-items-center gap-3">
      <div class="d-flex align-items-center gap-2">
        <span class="dot bg-dark"></span>
        <span class="small fw-medium">This year</span>
      </div>
      <div class="d-flex align-items-center gap-2">
        <span class="dot border bg-light"></span>
        <span class="small text-muted">Last year</span>
      </div>
    </div>
  </div>
  <div class="chart-container" style="height: 300px;">
    <canvas #lineChart></canvas>
  </div>
</div>
