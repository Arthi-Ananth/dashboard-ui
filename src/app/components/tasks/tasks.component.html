<div class="card p-4 border-0 h-100 shadow-none">
  <h6 class="fw-bold mb-4">Tasks</h6>
  <div class="task-list">
    <div *ngFor="let task of tasks" class="task-item d-flex align-items-start mb-3">
      <div class="form-check me-2">
        <input class="form-check-input" type="checkbox" [checked]="task.completed">
      </div>
      <div>
        <p class="small fw-medium mb-0" [class.text-decoration-line-through]="task.completed">{{ task.title }}</p>
        <span class="text-muted extra-small">{{ task.date }}</span>
      </div>
    </div>
  </div>
  <button class="btn btn-link text-decoration-none p-0 mt-auto small fw-bold text-dark text-start">
    SEE ALL <i class="bi bi-chevron-right small"></i>
  </button>
</div>
