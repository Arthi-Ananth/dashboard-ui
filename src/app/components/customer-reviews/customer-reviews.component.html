<div class="card p-4 border-0 h-100 shadow-none">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h6 class="fw-bold mb-0">Customer Reviews</h6>
    <span class="text-muted small">Messages</span>
  </div>
  
  <div class="review-list flex-grow-1 overflow-auto pe-2" style="max-height: 250px;">
    <div class="review-item mb-4" *ngFor="let review of reviews">
      <div class="d-flex justify-content-between align-items-center mb-1">
        <span class="small fw-bold">{{ review.name }}</span>
        <span class="text-muted extra-small">{{ review.time }}</span>
      </div>
      <p class="small text-muted mb-1">{{ review.text }}</p>
      <div class="stars d-flex gap-1">
        <i class="bi bi-star-fill text-warning fs-xs" *ngFor="let s of [1,2,3,4,5]; let i = index" [class.opacity-25]="i >= review.rating"></i>
        <span class="extra-small text-muted ms-2">{{ review.rating }}/5</span>
      </div>
    </div>
  </div>
  
  <div class="border-top pt-3 mt-3">
    <button class="btn btn-link text-decoration-none p-0 w-100 text-center small fw-bold text-dark">
      SEE ALL REVIEWS <i class="bi bi-chevron-right small"></i>
    </button>
  </div>
</div>
