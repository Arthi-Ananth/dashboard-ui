<div class="card p-4 border-0 h-100 shadow-none">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h6 class="fw-bold mb-0 fs-7">Recent Conversations</h6>
    <button class="btn btn-link p-0 text-muted"><i class="bi bi-three-dots"></i></button>
  </div>

  <div class="chat-container">
    <div *ngFor="let chat of chats" class="chat-message mb-3 d-flex" [class.justify-content-end]="chat.type === 'outgoing'">
      <div class="d-flex" [class.flex-row-reverse]="chat.type === 'outgoing'">
        <img [src]="'https://ui-avatars.com/api/?name=' + chat.name + '&background=random'" class="rounded-circle" width="24" height="24">
        <div class="message-bubble px-3 py-2 rounded-3 mx-2" [class.bg-incoming]="chat.type === 'incoming'" [class.bg-outgoing]="chat.type === 'outgoing'">
          <p class="mb-1">{{ chat.message }}</p>
          <div class="text-end">
            <span class="extra-small">{{ chat.time }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="mt-auto pt-3">
    <div class="d-flex gap-2">
      <input type="text" class="form-control input-sm border-0 bg-light" placeholder="Enter your text">
      <button class="btn btn-send rounded-3 px-3" type="button">Send</button>
    </div>
  </div>
</div>
